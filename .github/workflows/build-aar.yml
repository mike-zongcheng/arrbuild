name: Build UniApp Android Plugin AAR

on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 设置 JDK 11（对 UniApp 最友好的 Java 版本）
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    # 3. 强制下载并配置兼容的旧版 Gradle (指定 7.2)
    - name: Setup Gradle 7.2
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '7.2'

    # 4. 动态生成 settings.gradle，声明全局插件源（解决 plugins 找不到的问题，且不污染 build.gradle）
    - name: Configure Gradle Plugin Repositories
      run: |
        cat << 'EOF' > android/settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = 'android'
        EOF

    # 5. 使用 Gradle 7.2 进行编译
    - name: Build with Gradle
      run: |
        cd android
        gradle assembleRelease

    # 6. 收集打包好的 AAR 供下载
    - name: Upload AAR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UniApp-Plugin-AARs
        path: |
          android/**/build/outputs/aar/*-release.aar
          android/**/build/outputs/aar/*.aar
