name: Build UniApp Android Plugin AAR

on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 设置 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. 自动安装并配置 Gradle 环境（解决没有 gradlew 的问题）
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 4. 强行使用全局 gradle 命令进行编译
    - name: Build with Gradle
      run: |
        cd android
        gradle assembleRelease

    # 5. 收集打包好的 AAR 供下载
    - name: Upload AAR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UniApp-Plugin-AARs
        path: |
          android/**/build/outputs/aar/*-release.aar
          android/**/build/outputs/aar/*.aar
