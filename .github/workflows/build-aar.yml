# 编译 GlobalFloat.aar
# 支持独立仓库 arrbuild（根目录有 android/）以及 uni-app 内嵌路径
# 缺少 settings.gradle / 根 build.gradle 时会自动生成

name: Build GlobalFloat AAR

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'
      - 'nativeplugins/GlobalFloat/**'
      - 'settings.gradle'
      - 'build.gradle'
      - '.github/workflows/build-aar.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project root
        id: proj
        run: |
          if [ -d nativeplugins/GlobalFloat/android ]; then
            echo "dir=nativeplugins/GlobalFloat" >> "$GITHUB_OUTPUT"
            echo "Detected: nested nativeplugins/GlobalFloat"
          elif [ -d android ] && [ -f android/build.gradle ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
            echo "Detected: standalone (android/ at root)"
          else
            echo "::error::找不到 android/ 工程目录"
            ls -la
            exit 1
          fi

      - name: Ensure Gradle root files
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          root = Path('.')
          print('PWD', root.resolve())
          print('listing:', sorted(p.name for p in root.iterdir()))

          (root / 'settings.gradle').write_text("""pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = 'GlobalFloat'
          include ':android'
          """, encoding='utf-8')

          (root / 'build.gradle').write_text("""buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.4'
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          """, encoding='utf-8')

          (root / 'gradle.properties').write_text(
              "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8\n"
              "android.useAndroidX=true\n"
              "android.nonTransitiveRClass=true\n",
              encoding='utf-8'
          )

          aar = root / 'android' / 'libs' / 'uniapp-v8-release.aar'
          if not aar.exists():
              raise SystemExit('缺少 android/libs/uniapp-v8-release.aar')
          print('uniapp aar ok:', aar, 'size=', aar.stat().st_size)
          print('wrote settings.gradle / build.gradle / gradle.properties')
          PY

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Assemble release AAR
        working-directory: ${{ steps.proj.outputs.dir }}
        run: gradle :android:assembleRelease --no-daemon --stacktrace

      - name: Collect GlobalFloat.aar
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          SRC=$(ls android/build/outputs/aar/*.aar | head -n 1)
          echo "Found: $SRC"
          cp "$SRC" android/GlobalFloat.aar
          cp "$SRC" "${GITHUB_WORKSPACE}/GlobalFloat.aar"
          ls -lh "${GITHUB_WORKSPACE}/GlobalFloat.aar"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlobalFloat-aar
          path: GlobalFloat.aar
          if-no-files-found: error
          retention-days: 30
