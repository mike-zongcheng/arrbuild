name: Build UniApp Android Plugin AAR

on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库代码
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 设置 JDK 11 (最契合你本地 SDK 版本的 Java 运行环境)
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    # 3. 配置编译所需的 Gradle 7.5
    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '7.5'

    # 4. 构建父项目，并把“包含 uniapp-v8-release.aar 的整个子工程”完整且完好地放入其中
    - name: Construct Root Project Environment
      run: |
        # 1. 临时备份现有的安卓项目目录
        mv android globalfloat
        
        # 2. 重新创建一个干净的父项目根目录
        mkdir android
        
        # 3. 将原项目（含已经手动上传的 libs）完整移入其中
        mv globalfloat android/
        
        # 4. 动态写入父项目的 build.gradle (提供 Android 构建基本环境)
        cat << 'EOF' > android/build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:7.4.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF

        # 5. 动态写入 settings.gradle (挂载 globalfloat 模块)
        cat << 'EOF' > android/settings.gradle
        include ':globalfloat'
        EOF

    # 5. 执行 Gradle 编译
    - name: Build Submodule with Gradle
      run: |
        cd android
        gradle :globalfloat:assembleRelease

    # 6. 收集编译出来的 AAR 产物
    - name: Upload AAR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UniApp-Plugin-AARs
        path: |
          android/globalfloat/build/outputs/aar/*-release.aar
          android/globalfloat/build/outputs/aar/*.aar
