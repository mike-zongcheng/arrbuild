# 编译 GlobalFloat.aar（含 ScreenshotGuardService）
# 用法：
# 1. 确保 nativeplugins/GlobalFloat/android/libs/uniapp-v8-release.aar 已提交到仓库
# 2. GitHub → Actions → Build GlobalFloat AAR → Run workflow
# 3. 跑完后在 Artifacts 下载 GlobalFloat.aar
# 4. 放到本机：nativeplugins/GlobalFloat/android/GlobalFloat.aar
# 5. HBuilderX 重新打自定义基座

name: Build GlobalFloat AAR

on:
  workflow_dispatch:
  push:
    paths:
      - 'nativeplugins/GlobalFloat/**'
      - '.github/workflows/build-aar.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nativeplugins/GlobalFloat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check uniapp aar exists
        run: |
          if [ ! -f android/libs/uniapp-v8-release.aar ]; then
            echo "::error::缺少 android/libs/uniapp-v8-release.aar"
            echo "请从 uni-app Android 离线 SDK 复制该文件到 libs/ 并提交到仓库后再跑。"
            exit 1
          fi
          ls -lh android/libs/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Assemble release AAR
        run: gradle :android:assembleRelease --no-daemon --stacktrace

      - name: Collect GlobalFloat.aar
        run: |
          SRC=$(ls android/build/outputs/aar/*.aar | head -n 1)
          echo "Found: $SRC"
          cp "$SRC" android/GlobalFloat.aar
          cp "$SRC" "${GITHUB_WORKSPACE}/GlobalFloat.aar"
          ls -lh android/GlobalFloat.aar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlobalFloat-aar
          path: GlobalFloat.aar
          if-no-files-found: error
          retention-days: 30
