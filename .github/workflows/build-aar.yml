name: Build UniApp Android Plugin AAR

on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 设置 JDK 11（对 UniApp 原生插件最友好的 Java 版本）
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    # 3. 强制下载并配置兼容的旧版 Gradle (这里指定 7.2)
    - name: Setup Gradle 7.2
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '7.2'

    # 4. 关键步骤：动态注入 Android 编译依赖（解决 Plugin com.android.library 找不到的问题）
    - name: Inject Android Buildscript Classpath
      run: |
        cat << 'EOF' > temp_build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:7.1.3'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
        # 把原本的 build.gradle 内容追加到后面，合并成新的 build.gradle
        cat android/build.gradle >> temp_build.gradle
        mv temp_build.gradle android/build.gradle

    # 5. 使用 Gradle 7.2 进行编译
    - name: Build with Gradle
      run: |
        cd android
        gradle assembleRelease

    # 6. 收集打包好的 AAR 供下载
    - name: Upload AAR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UniApp-Plugin-AARs
        path: |
          android/**/build/outputs/aar/*-release.aar
          android/**/build/outputs/aar/*.aar
