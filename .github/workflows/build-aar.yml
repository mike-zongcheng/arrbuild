# 编译 GlobalFloat.aar（含 ScreenshotGuardService）
#
# 支持两种仓库结构：
# A) 独立仓库 arrbuild（根目录即有 android/、package.json）← 你当前这种
# B) 嵌在 uni-app 工程里：nativeplugins/GlobalFloat/
#
# 用法：Actions → Build GlobalFloat AAR → Run workflow
# 下载 Artifact：GlobalFloat-aar → 放到 android/GlobalFloat.aar → 打自定义基座

name: Build GlobalFloat AAR

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'
      - 'nativeplugins/GlobalFloat/**'
      - 'settings.gradle'
      - 'build.gradle'
      - '.github/workflows/build-aar.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project root
        id: proj
        run: |
          if [ -f nativeplugins/GlobalFloat/settings.gradle ] && [ -d nativeplugins/GlobalFloat/android ]; then
            echo "dir=nativeplugins/GlobalFloat" >> "$GITHUB_OUTPUT"
            echo "Detected layout: uni-app nested (nativeplugins/GlobalFloat)"
          elif [ -d android ] && [ -f android/build.gradle ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
            echo "Detected layout: standalone plugin repo (android/ at root)"
          else
            echo "::error::找不到插件工程。需要根目录有 android/，或存在 nativeplugins/GlobalFloat/"
            ls -la
            exit 1
          fi

      - name: Check gradle + uniapp aar
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          echo "PWD=$(pwd)"
          ls -la
          if [ ! -f settings.gradle ]; then
            echo "::error::缺少 settings.gradle（请放在插件根目录，与 android/ 同级）"
            exit 1
          fi
          if [ ! -f build.gradle ]; then
            echo "::error::缺少根目录 build.gradle（请与 android/ 同级）"
            exit 1
          fi
          if [ ! -f android/libs/uniapp-v8-release.aar ]; then
            echo "::error::缺少 android/libs/uniapp-v8-release.aar"
            exit 1
          fi
          ls -lh android/libs/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Assemble release AAR
        working-directory: ${{ steps.proj.outputs.dir }}
        run: gradle :android:assembleRelease --no-daemon --stacktrace

      - name: Collect GlobalFloat.aar
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          SRC=$(ls android/build/outputs/aar/*.aar | head -n 1)
          echo "Found: $SRC"
          cp "$SRC" android/GlobalFloat.aar
          cp "$SRC" "${GITHUB_WORKSPACE}/GlobalFloat.aar"
          ls -lh android/GlobalFloat.aar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlobalFloat-aar
          path: GlobalFloat.aar
          if-no-files-found: error
          retention-days: 30
